<!DOCTYPE html>
<html>
<head>
    <title>PaperVerse | Explore Knowledge Space</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --gemini-blue: #4285f4;
            --gemini-bg: #f8f9fa;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1f1f1f;
            --text-sub: #474747;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body { 
            font-family: 'Google Sans', Roboto, Arial, sans-serif; 
            margin: 0; 
            background: var(--gemini-bg);
            color: var(--text-main);
            overflow: hidden;
        }

        #mynetwork {
            width: 100vw;
            height: 100vh;
        }

        /* Glassmorphism Details Window */
        #details-window {
            display: none;
            position: fixed;
            top: 24px;
            right: 24px;
            width: 340px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            box-shadow: var(--shadow);
            border-radius: 24px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        #details-window h3 { 
            margin-top: 0; 
            color: var(--gemini-blue); 
            font-size: 20px;
            font-weight: 500;
        }

        #details-window p { 
            color: var(--text-sub); 
            line-height: 1.6; 
            font-size: 14px; 
        }

        .close-btn {
            background: #e2e2e2;
            color: #444;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            float: right;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
        }

        .close-btn:hover { background: #d2d2d2; }

        .dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Logo */
        .logo {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 1000;
        }

        .logo h2 {
            color: var(--gemini-blue);
            font-weight: 500;
            margin: 0;
            font-size: 22px;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            bottom: 24px;
            left: 150px;
            z-index: 1000;
            padding: 12px 24px;
            border: 2px dashed #dadce0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--gemini-blue);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            text-decoration: none;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
        }

        .back-btn:hover {
            border-color: var(--gemini-blue);
            background-color: #e8f0fe;
        }

        /* Search Box */
        .search-container {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            width: 240px;
            padding: 10px 16px;
            border: 2px solid #dadce0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            color: var(--text-main);
            font-size: 14px;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .search-input::placeholder { color: #9aa0a6; }
        .search-input:focus {
            border-color: var(--gemini-blue);
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.15);
        }
    </style>
</head>
<body>

<div class="logo">
    <h2>PaperVerse | Explore</h2>
</div>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="Search nodes..." autocomplete="off">
</div>

<a href="index.html" class="back-btn">
    <span>Back</span>
</a>

<div id="details-window">
    <button class="close-btn" onclick="hideDetails()">close</button>
    <h3 id="info-title"></h3>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 12px 0;">
    <p id="info-content"></p>
</div>


<div id="mynetwork"></div>

<script src="kg.js"></script>
</body>
</html>
